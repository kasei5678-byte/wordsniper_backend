<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Word Sniper</title>

    <style>
/* ======== 共通背景 ======== */
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://images.unsplash.com/photo-1520975918318-3a8e3b6f52b4?auto=format&fit=crop&w=1400&q=80') no-repeat center/cover;
    font-family:'Segoe UI',sans-serif;
    color:white;
}

/* ======== 画面共通 ======== */
.screen{
    display:none;
    text-align:center;
    background:rgba(0,0,0,0.55);
    padding:40px 60px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
    backdrop-filter:blur(6px);
}
#home{ display:block; }

/* ======== 入力欄 ======== */
input{
    width:260px;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    font-size:16px;
}

/* ======== ボタン ======== */
button{
    width:200px;
    padding:12px;
    margin-top:20px;
    border-radius:8px;
    border:none;
    background:#ff3333;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 0 10px rgba(255,0,0,0.7);
}
button:hover{
    background:#ff5555;
    transform:scale(1.05);
}

/* ======== スピナー ======== */
.spinner{
    margin:20px auto 0;
    width:40px;
    height:40px;
    border:4px solid rgba(255,255,255,0.3);
    border-top-color:#ff3333;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ======== ゲーム画面の UI ======== */
.container{
    background:white;
    padding:30px;
    border-radius:20px;
    width:320px;
    min-height:500px;
    margin:auto;
    box-shadow:0 10px 15px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    color:black;
}

#scores{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.player-box{
    flex:1;
    background:#111;
    color:white;
    border-radius:15px;
    padding:10px;
}

.player-name{ font-size:20px; font-weight:bold; }
.player-score{ font-size:30px; margin-top:10px; }

.box-container{
    display:flex;
    gap:10px;
}

.box{
    flex:1;
    background:#008000;
    border:none;
    border-radius:20px;
    padding:40px;
    margin-top:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    color:white;
    font-size:20px;
}

/* ======== 回答ログ ======== */
#answerLog{
    margin-top:20px;
    background:#eee;
    padding:10px;
    border-radius:10px;
    height:120px;
    overflow-y:auto;
    font-size:18px;
}

/* ======== 回答入力 ======== */
#answerArea{
    position:absolute;
    top:70%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    display:none;
    width:300px;
}

#answerInput{
    width:90px;
    padding:15px;
    font-size:20px;
    border-radius:10px;
    border:2px solid #ccc;
    margin-bottom:15px;
}

/* ======== 正解/不正解 ======== */
#resultMessage{
    position:absolute;
    top:60%;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
    font-weight:bold;
    color:gold;
    text-shadow:0 0 10px orange;
    display:none;
}
    </style>
</head>

<body>

<!-- ホーム画面 -->
<div id="home" class="screen">
    <h1>WORD SNIPER</h1>
    <input id="room" placeholder="ルームIDを入力"><br>
    <input id="name" placeholder="名前を入力"><br>
    <button id="join-btn">参加</button>
</div>

<!-- 待機画面 -->
<div id="waiting" class="screen">
    <h1>待機中...</h1>
    <p>もう1人のプレイヤーを待っています</p>
    <div class="spinner"></div>
    <button id="exit-btn" style="margin-top:25px; background:#555;">退出</button>
</div>

<!-- ゲーム画面 -->
<div id="game" class="screen">
    <div class="container">

        <div id="scores">
            <div class="player-box">
                <div class="player-name" id="playerName1">1P</div>
                <div class="player-score" id="score1">0</div>
            </div>

            <div class="player-box">
                <div class="player-name" id="playerName2">2P</div>
                <div class="player-score" id="score2">0</div>
            </div>
        </div>

        <div class="box-container">
            <button class="box" id="themeBox">テーマ</button>
            <button class="box" id="wordBox">頭文字</button>
        </div>

        <div id="answerLog"></div>

        <div id="resultMessage"></div>

        <div id="answerArea">
            <input type="text" id="answerInput" onkeydown="checkEnter(event)">
            <button onclick="sendAnswer()">送信</button>
        </div>

        <div class="bottom-menu">
            <button class="btn1" onclick="openInput()" id="playerButton">回答</button>
        </div>

    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ======== Socket.io ======== */
const socket = io();

const home = document.getElementById("home");
const waiting = document.getElementById("waiting");
const game = document.getElementById("game");

document.getElementById("join-btn").onclick = () => {
    const room = document.getElementById("room").value;
    const name = document.getElementById("name").value;

    if(!room || !name) return;

    home.style.display = "none";
    waiting.style.display = "block";

    socket.emit("joinRoom", room, name);
};

socket.on("waiting", () => {
    waiting.style.display = "block";
});

socket.on("matched", (players) => {
    waiting.style.display = "none";
    game.style.display = "block";

    document.getElementById("playerName1").textContent = players.p1;
    document.getElementById("playerName2").textContent = players.p2;
});

/* ======== ラウンド開始（テーマ＋頭文字） ======== */
socket.on("startRound", (data) => {
    document.getElementById("themeBox").textContent = data.theme;
    document.getElementById("wordBox").textContent = data.head;

    document.getElementById("answerLog").innerHTML = "";
});

/* ======== 判定結果 ======== */
socket.on("judgeResult", (data) => {
    addLog(`${data.player}：${data.answer} → ${data.correct ? "⭕ 正解" : "❌ 不正解"}`);
    showJudgeMessage(data.correct);
});

function addLog(message){
    const log = document.getElementById("answerLog");
    const p = document.createElement("p");
    p.textContent = message;
    log.appendChild(p);
    log.scrollTop = log.scrollHeight;
}

function showJudgeMessage(isCorrect){
    const msg = document.getElementById("resultMessage");

    msg.textContent = isCorrect ? "正解！" : "不正解！";
    msg.style.color = isCorrect ? "gold" : "red";
    msg.style.display = "block";

    setTimeout(() => {
        msg.style.display = "none";
    }, 1200);
}

/* ======== 回答入力 ======== */
function openInput(){
    document.getElementById("answerArea").style.display = "block";
}

function sendAnswer(){
    const answer = document.getElementById("answerInput").value;

    socket.emit("answer", answer);

    document.getElementById("answerArea").style.display = "none";
    document.getElementById("answerInput").value = "";
}

function checkEnter(event){
    if(event.key === "Enter"){
        sendAnswer();
    }
}

/* ======== 退出 ======== */
document.getElementById("exit-btn").onclick = () => {
    waiting.style.display = "none";
    home.style.display = "block";
};
</script>

</body>
</html>
