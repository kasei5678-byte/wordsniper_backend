
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ワードスナイパー</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- スタート画面 -->
<div id="startScreen">
    <h1>ワードスナイパー</h1>

    <button onclick="goCreate()">ルーム作成</button>
    <button onclick="goJoin()">ルーム参加</button>
    <button onclick="showRules()">遊び方</button>
</div>

<!-- 遊び方 -->
<div id="rulesScreen" style="display:none;">
    <h2>遊び方</h2>

    <div class="rules-content">
        <p style="text-align:center;font-weight:bold;color:#f44336;margin-bottom:15px;">
            ⚠️ 回答は【ひらがな】または【カタカナ】で入力してください
        </p>

        <p>テーマと文字に合う言葉を答えます。</p>
        <div class="example">
            例）テーマ：<strong>食べ物</strong> ＊ 文字：<strong>「あ」</strong><br>
            👉 「あいすくりーむ」「アイス」など
        </div>

        <ul style="padding-left:20px;margin-top:15px;">
            <li>⭕ 正解：＋10点</li>
            <li>❌ 不正解：－10点</li>
            <li>🏆 100点先取で勝ち！</li>
        </ul>
    </div>

    <button class="grayBtn" onclick="backStart()">戻る</button>
</div>

<!-- ルーム参加 -->
<div id="joinScreen" style="display:none;">
    <h2>ルーム参加</h2>

    <p>あなたの名前</p>
    <input type="text" id="joinPlayerNameInput" placeholder="名前を入力">

    <p>ルーム番号</p>
    <input type="text" id="joinRoomCodeInput" placeholder="ルーム番号（6桁）">

    <button class="greenBtn" onclick="joinRoom()">参加して待機</button>
    <button class="grayBtn" onclick="backStart()">戻る</button>
</div>

<!-- ルーム作成 -->
<div id="createScreen" style="display:none;">
    <h2>ルーム作成</h2>

    <p>あなたの名前</p>
    <input type="text" id="createPlayerNameInput" placeholder="名前を入力">

    <p>ルーム番号</p>
    <input type="text" id="createRoomCodeInput" placeholder="ルーム番号（6桁）">

    <label>
        <input type="checkbox" id="publicCheck">
        公開ルームにする
    </label>

    <button class="greenBtn" onclick="createRoom()">ホストとして待機</button>
    <button class="grayBtn" onclick="backStart()">戻る</button>
</div>

<!-- 待機画面 -->
<div id="waitingScreen" style="display:none;">
    <h2>ルーム待機中</h2>

    <div class="loading-box">
        <span class="dots">対戦相手を待っています</span>
    </div>

    <p class="room-display-text">
        ルーム番号: <span id="displayRoomNumber">------</span>
    </p>

    <button class="grayBtn" onclick="cancelWaiting()">キャンセル</button>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen" style="display:none;">
    <h2 id="themeText">テーマ：</h2>
    <h3 id="letterText">文字：</h3>

    <div id="scores">
        <div class="player-box">あなた：<span id="p1Score">0</span></div>
        <div class="player-box">相手：<span id="p2Score">0</span></div>
    </div>

    <input type="text" id="answerInput" placeholder="回答を入力">
    <button onclick="sendAnswer()">辞書判定で送信</button>
    <button onclick="sendAI()">AI判定で送信</button>
    <button onclick="sendNG()">AI使わず送信</button>

    <div id="logArea"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// 画面切り替え
function hideAll() {
    document.querySelectorAll("div[id$='Screen']").forEach(e => e.style.display = "none");
}

function goCreate() {
    hideAll();
    document.getElementById("createScreen").style.display = "block";
}

function goJoin() {
    hideAll();
    document.getElementById("joinScreen").style.display = "block";
}

function showRules() {
    hideAll();
    document.getElementById("rulesScreen").style.display = "block";
}

function backStart() {
    hideAll();
    document.getElementById("startScreen").style.display = "block";
}

// ルーム作成
function createRoom() {
    const name = document.getElementById("createPlayerNameInput").value;
    const room = document.getElementById("createRoomCodeInput").value;
    const isPublic = document.getElementById("publicCheck").checked;

    socket.emit("make_room", { name, ID: room, isPublic });

    hideAll();
    document.getElementById("waitingScreen").style.display = "block";
    document.getElementById("displayRoomNumber").textContent = room;
}

// ルーム参加
function joinRoom() {
    const name = document.getElementById("joinPlayerNameInput").value;
    const room = document.getElementById("joinRoomCodeInput").value;

    socket.emit("join_room", { name, ID: room });

    hideAll();
    document.getElementById("waitingScreen").style.display = "block";
    document.getElementById("displayRoomNumber").textContent = room;
}

// 待機キャンセル
function cancelWaiting() {
    socket.emit("cancelWaiting");
    backStart();
}

// ゲーム開始
socket.on("MAKE_GAME", () => {
    hideAll();
    document.getElementById("gameScreen").style.display = "block";

    socket.emit("give_theme");
    socket.emit("give_word");
});

// テーマ受信
socket.on("give_theme", (theme) => {
    document.getElementById("themeText").textContent = "テーマ：" + theme;
});

// 文字受信
socket.on("give_word", (letter) => {
    document.getElementById("letterText").textContent = "文字：" + letter;
});

// スコア更新
socket.on("change_point", ({ point, person }) => {
    if (person === 1) document.getElementById("p1Score").textContent = point;
    if (person === 2) document.getElementById("p2Score").textContent = point;
});

// ログ表示
socket.on("Another_player", ({ person, ans }) => {
    const log = document.getElementById("logArea");
    const div = document.createElement("div");
    div.textContent = `相手(${person})：${ans}`;
    log.appendChild(div);
});

// 辞書判定
function sendAnswer() {
    const ans = document.getElementById("answerInput").value;
    socket.emit("ans_check", { you: 1, ans });
    document.getElementById("answerInput").value = "";
}

// AI判定
function sendAI() {
    const ans = document.getElementById("answerInput").value;
    socket.emit("AI_test", { you: 1, ans });
    document.getElementById("answerInput").value = "";
}

// AI使わない
function sendNG() {
    const ans = document.getElementById("answerInput").value;
    socket.emit("don't_use_AI", { you: 1, ans });
    document.getElementById("answerInput").value = "";
}
</script>

</body>
</html>
