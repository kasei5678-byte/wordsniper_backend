<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ワードスナイパー</title>

<style>

body{
  font-family:sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
  text-align:center;
  padding:50px;
}

.container{
  background:white;
  padding:30px;
  border-radius:20px;
  width:320px;
  min-height:500px;
  margin:auto;
  box-shadow:0 10px 15px rgba(0,0,0,0.2);

  display:flex;
  flex-direction:column;
}

#scores{
  display:flex;
  gap:20px;

  margin-bottom:20px;
}

.player-box{ 
  flex:1;

  background:#111;
  color:white;

  border-radius:15px;
  padding:10px;
}

.player-name{
  font-size:20px;
  font-weight:bold;
}

.player-score{
  font-size:30px;
  margin-top:10px;
}

.box-container{
  display:flex;
  gap:10px;
}

.box{
  flex:1;
  background:#008000;
  border:none;
  border-radius:20px;
  padding:40px;
  margin-top:15px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);

  color:white;
  font-size:20px;
}

.bottom-menu{
  display:flex;
  gap:10px;

  margin-top:auto;
}

.bottom-menu button{
  flex:1;
  height:80px;

  font-size:20px;
  border-radius:12px;
  border:none;

  color:white;
  cursor:pointer;
}

.btn1{
  background:red;
}

.btn2{
  background:blue;
}
.yes-btn{
  background:#4CAF50;
  color:white;

  border:none;
  border-radius:10px;

  padding:10px 20px;

  font-size:18px;
}

.no-btn{
  background:#f44336;
  color:white;

  border:none;
  border-radius:10px;

  padding:10px 20px;

  font-size:18px;
}

#startScreen{

  background:white;

  width:350px;

  margin:auto;

  padding:40px;

  border-radius:20px;

  box-shadow:0 10px 20px rgba(0,0,0,0.2);

  display:flex;

  flex-direction:column;

  gap:15px;

}

#startScreen h1{

  font-size:40px;

  margin-bottom:30px;

}

#startScreen button{

  padding:15px 30px;

  font-size:20px;

  border-radius:15px;

  background:#4CAF50;

  color:white;

  cursor:pointer;

}
#answerArea{
  position:absolute;

  top: 70%;
  left: 50%;

  transform: translate(-50%, -50%);

  background: white;

  padding: 30px;

  border-radius: 20px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.3);

  display: none;

  width: 300px;
}

#answerInput{

  width: 90px;

  padding: 15px;

  font-size: 20px;

  border-radius: 10px;

  border: 2px solid #ccc;

  margin-bottom: 15px;
}

button{
  transition: 0.1s;
}

button:hover{
  transform: scale(1.05);
}

button:active{
  transform: scale(0.95);
}

#resultMessage{
  position: absolute;

  top: 60%;
  left: 50%;

  transform: translateX(-50%);

  font-size: 100px;
  font-weight: bold;

  color: gold;

  text-shadow: 0 0 10px orange;

  display: none;
}

#judgeArea{
  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  background:white;

  padding:20px;

  border-radius:20px;

  box-shadow:0 10px 30px rgba(0,0,0,0.3);

  display:none;
}



</style>
</head>

<body>
<div id="startScreen">

  <h1>ワードスナイパー</h1>

  <button onclick="createRoom()">
    ルーム作成い
  </button>
    
  <button onclick="joinRoom()">
    ルーム参加
  </button>

  <button onclick="showRules()">
    遊び方
  </buton>

  <button onclick="startGame()">
    ゲームをプレイする
  </button>

</div>

<div id="joinScreen" style="display:none;">

  <h2>ルーム参加</h2>

  <input type="text" id="roomCode"
        placeholder="ルーム番号">

  <button onclick="joinRoomServer()">
    参加
  </button>

</div>

<div class="container" id="gameScreen" style="display:none;">

  <div id="scores">

    <div class="player-box">
      <div class="player-name" id="playerName1">1P</div>
      <div class="player-score" id="score1">0</div>
    </div>

    <div class="player-box">
      <div class="player-name">2P</div>
      <div class="player-score" id="score2">0</div>
    </div>

  </div>

  <div class="box-container">

    <button class="box" onclick="changeTheme()" id="themeBox">
    </button>

    <button class="box" id="wordBox">
    </button>

  </div>

  <div id="resultMessage"></div>

<div id="answerArea" style="display:none;">

  <input type="text"
        id="answerInput"
        onkeydown="checkEnter(event)">

  <button onclick="sendAnswer()">
    送信
  </button>

</div>

  <div class="bottom-menu">

    <button class="btn1" onclick="openInput()"id="playerButton">
      1P
    </button>

  </div>

  <div id="judgeArea" style="display:none;">

    <p>チャレンジしますか？</p>

    <button class="yes-btn" onclick="aiJudgeYes()">
      はい
    </button>

    <button class="no-btn" onclick="aiJudgeNo()">
      いいえ
    </button>

  </div>

</div>


<script>
var themeIndex;
var wordIndex;

var data;

async function startGame(){

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "flex";

  let playerName =
    prompt("名前を入力してください");
  document.getElementById("playerName1").textContent = playerName;
  const res = await fetch("http://localhost:3000/json");
  data = await res.json();
  changeTheme();
}

function createRoom(){

  alert("ルーム作成画面へ");
}

function joinRoom(){

  alert("ルーム参加画面へ");

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("joinScreen").style.display = "block";
}

function showRules(){

  alert("テーマと文字に合う言葉を答えます。\n例テーマ：食べ物　文字：あ　アイスクリームなど。\n先に得点した方が勝ちです。");
}

function openInput(){

  document.getElementById("answerArea").style.display =
    "block";
}

async function sendAnswer(){
  //const formData =new FormData();

  //alert(document.getElementById("themeBox").textContent);
  //alert(document.getElementById("wordBox").textContent);
  //alert(document.getElementById("answerInput").value);

  //formData.append("theme",document.getElementById("themeBox").textContent);
  //formData.append("words",document.getElementById("wordBox").textContent);
  //formData.append("ans",document.getElementById("answerInput").value);
  const ret = await fetch("http://localhost:3000/ans_check", {
    method:"POST",
    headers: {
    "Content-Type": "application/json"
    },
    body: JSON.stringify({
    theme_INDEX:themeIndex,
    word_INDEX: wordIndex,
    ans:document.getElementById("answerInput").value
  })
  });
  const ans = await ret.json();
  
  console.log("ans =", ans.TF);
  console.log("type =", typeof ans);
  if(ans.TF.includes("ok")){
    showMessage("正解！","gold");
    addPoint(1, ans.PT);
    changeTheme();
  }
  else if(ans.TF.includes("NG")){
    document.getElementById("judgeArea").style.display ="block";
  }
  else{console.log("error");}

  document.getElementById("answerArea").style.display ="none";
  
}

async function aiJudgeYes(){
  const AI_check = await fetch("http://localhost:3000/AI_test", {
    method:"POST",
    headers: {
    "Content-Type": "application/json"
    },
    body: JSON.stringify({
    theme:document.getElementById("themeBox").textContent,
    word: document.getElementById("wordBox").textContent,
    ans:document.getElementById("answerInput").value
  })
  });
  const AI_ans = await AI_check.text();
  
  console.log("ans =", AI_ans);
  console.log("type =", typeof AI_ans);
  if(AI_ans.includes("1")){
    showMessage("正解！","gold");
    addPoint(1, 1000);
    changeTheme();
  }

  else if(AI_ans.includes("0")){
    document.getElementById("judgeArea").style.display ="block";
    showMessage("不正解！","red");
    addPoint(1,-500);
    
  }

  else{console.log("error");}

  document.getElementById("judgeArea").style.display="none";
}

async function aiJudgeNo(){
  showMessage("不正解！","red");
  addPoint(1, -100);
  document.getElementById("judgeArea").style.display="none";
}

let scores = [0,0];

function addPoint(player, PT){

  scores[player - 1]+=PT;

  document.getElementById("score" + player).textContent =
    scores[player - 1];
}

async function changeTheme(){

  themeIndex = Math.floor(Math.random()*data.theme.length);
  wordIndex = Math.floor(Math.random()*data.theme[themeIndex].answer.length);

  document.getElementById("themeBox").textContent = data.theme[themeIndex].name;
  document.getElementById("wordBox").textContent = data.theme[themeIndex].answer[wordIndex][0];
}

function checkEnter(event){

  if(event.key === "Enter"){
    sendAnswer();
  }
}

function showMessage(text,color){

  let message =
    document.getElementById("resultMessage");

  message.textContent = text;

  message.style.color = color;

  message.style.display = "block";
  

  setTimeout(function(){

    message.style.display = "none";

  },1000);

}


</script>



</body>
</html>
